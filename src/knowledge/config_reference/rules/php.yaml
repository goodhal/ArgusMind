        cwe:
          - CWE-78
      _quickScan: true
      _vulnType: COMMAND_INJECTION
      _cwe: CWE-78
      _chineseSeverity: 严重
    - id: QS-PHP-819
      name: CODE INJECTION
      patterns:
        - eval\s*\(
      category: code_injection
      severity: CRITICAL
      profiles:
        - security
