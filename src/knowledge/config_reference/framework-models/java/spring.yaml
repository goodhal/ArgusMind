        precision: high
      - name: org.springframework.web.bind.annotation.RequestHeader
        note: 请求头注解
        taint: true
        security-severity: medium
        precision: high

sinks:
  - category: url_forward
    description: URL 转发风险
    functions:
      - name: org.springframework.web.servlet.ModelAndView.ModelAndView
        note: 构造函数 - Argument[0] 是视图名
        severity: medium
        cwe: ["CWE-601"]
        security-severity: 6.1
        precision: high
      - name: org.springframework.web.servlet.ModelAndView.setViewName
        note: 设置视图名
        severity: medium
        cwe: ["CWE-601"]
        security-severity: 6.1
        precision: high

  - category: xss
    description: XSS 风险
    functions:
      - name: org.springframework.web.servlet.ModelAndView.addObject
        note: 添加模型对象
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: medium
      - name: org.springframework.web.bind.annotation.ResponseBody
        note: 响应体注解 - 直接返回对象
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: medium

  - category: path_injection
    description: 路径遍历风险
    functions:
      - name: org.springframework.core.io.Resource
        note: 资源加载 - 需验证路径
        severity: high
        cwe: ["CWE-022"]
        security-severity: 9.8
        precision: high

data_flow:
  - source: javax.servlet.http.HttpServletRequest.*
    sink: org.springframework.web.servlet.ModelAndView.*
    note: 请求参数不应直接用于视图名
    security-severity: medium
    precision: high
  - source: org.springframework.web.context.request.WebRequest.*
    sink: java.io.File.*
    note: 请求参数不应直接用于文件操作
    security-severity: critical
    precision: high
