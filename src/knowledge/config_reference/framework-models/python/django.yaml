# Framework Model: Django (Python Web Framework)
# Source: CodeQL + ArgusMind
#
# Description: 定义 Django 框架的安全 sink、source 和数据流转规则
#
# CWE 覆盖:
#   - CWE-022 (路径遍历)
#   - CWE-078 (命令注入)
#   - CWE-079 (XSS)
#   - CWE-089 (SQL 注入)
#   - CWE-502 (不安全的反序列化)
#   - CWE-601 (URL 重定向)
#   - CWE-352 (CSRF)

metadata:
  name: Django
  description: Django Web 框架的安全规则
  source: CodeQL + ArgusMind
  version: 1.0
  security-severity: high
  precision: high
  tags:
    - security
    - django
    - web

sources:
  - category: user_input
    description: Django 的各种请求输入
    functions:
      - name: django.http.request.HttpRequest.GET
        note: GET 查询参数
        taint: true
        security-severity: medium
        precision: high
      - name: django.http.request.HttpRequest.POST
        note: POST 表单数据
        taint: true
        security-severity: medium
        precision: high
      - name: django.http.request.HttpRequest.COOKIES
        note: Cookie
        taint: true
        security-severity: medium
        precision: high
      - name: django.http.request.HttpRequest.META
        note: 请求元数据（HTTP 头等）
        taint: true
        security-severity: medium
        precision: high
      - name: django.http.request.HttpRequest.body
        note: 请求体
        taint: true
        security-severity: high
        precision: high
      - name: django.http.request.HttpRequest.path
        note: 请求路径
        taint: true
        security-severity: low
        precision: high
      - name: django.http.request.HttpRequest.get_full_path
        note: 完整请求路径
        taint: true
        security-severity: low
        precision: high
      - name: django.http.request.HttpRequest.get_signed_cookie
        note: 签名 Cookie
        taint: true
        security-severity: medium
        precision: high
      - name: django.http.request.HttpRequest.FILES
        note: 上传文件
        taint: true
        security-severity: high
        precision: high
      - name: django.http.request.HttpRequest.session
        note: 会话数据
        taint: true
        security-severity: medium
        precision: high

sinks:
  - category: path_injection
    description: 路径遍历风险
    functions:
      - name: django.http.response.HttpResponse
        note: 响应内容 - 需确保安全
        severity: high
        cwe: ["CWE-022"]
        security-severity: 9.8
        precision: high
      - name: django.shortcuts.render
        note: 渲染模板
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: high
      - name: django.shortcuts.render_to_string
        note: 渲染为字符串
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: high
      - name: django.views.static.serve
        note: 静态文件服务 - 危险的路径参数
        severity: critical
        cwe: ["CWE-022"]
        security-severity: 9.8
        precision: high

  - category: sql_injection
    description: SQL 注入风险
    functions:
      - name: django.db.models.Model.objects.raw
        note: 原始 SQL 查询
        severity: critical
        cwe: ["CWE-089"]
        security-severity: 8.8
        precision: high
      - name: django.db.connection.cursor.execute
        note: 直接执行 SQL
        severity: critical
        cwe: ["CWE-089"]
        security-severity: 8.8
        precision: high

  - category: xss
    description: XSS 风险
    functions:
      - name: django.utils.safestring.mark_safe
        note: 标记为安全 HTML - 需谨慎使用
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: medium
      - name: django.template.loader.render_to_string
        note: 模板渲染
        severity: medium
        cwe: ["CWE-079"]
        security-severity: 6.1
        precision: high

  - category: url_redirection
    description: URL 重定向风险
    functions:
      - name: django.shortcuts.redirect
        note: URL 重定向
        severity: medium
        cwe: ["CWE-601"]
        security-severity: 6.1
        precision: high
      - name: django.http.response.HttpResponseRedirect
        note: HTTP 重定向响应
        severity: medium
        cwe: ["CWE-601"]
        security-severity: 6.1
        precision: high

data_flow:
  - source: django.http.request.HttpRequest.*
    sink: django.db.*
    note: 请求输入不应直接传给数据库操作
    security-severity: high
    precision: high
  - source: django.http.request.HttpRequest.*
    sink: subprocess.*
    note: 请求输入不应直接传给子进程
    security-severity: critical
    precision: high
