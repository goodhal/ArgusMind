name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  checks: read
  deployments: read
  issues: write
  pull-requests: write
  statuses: write

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '18'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # 测试策略说明
  # ========================================
  #
  # ArgusMind 采用分层测试策略：
  #
  # 1. **后端测试** (Python):
  #    - 单元测试：pytest，测试核心逻辑和 Agent
  #    - 集成测试：测试 API 端点和数据库连接
  #    - 测试范围：src/ 目录下的所有 Python 代码
  #
  # 2. **前端测试** (Node.js):
  #    - 单元测试：Jest，测试 React 组件
  #    - Demo 模式：测试 UI 在 mock 数据下的表现
  #    - 测试范围：frontend/src/ 目录下的所有 TypeScript/JavaScript 代码
  #
  # 3. **Docker 测试**:
  #    - 构建测试：确保 Docker 镜像可以成功构建
  #    - 运行测试：确保容器可以正常启动和运行
  #
  # 4. **测试优先级**:
  #    - Critical: 核心功能（Agent、API、数据库连接）
  #    - High: 主要功能（项目管理、任务执行）
  #    - Medium: 辅助功能（UI 组件、配置管理）
  #    - Low: 边缘功能和错误处理
  #
  # 5. **测试触发条件**:
  #    - Pull Request: 所有测试运行
  #    - Push to main: 所有测试运行 + Docker 构建
  #    - Tag push: Docker 发布 + GitHub Release
  #
  # ========================================

  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
        continue-on-error: false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

      - name: Test summary
        if: always()
        run: |
          echo "## 🧪 Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Version**: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Framework**: pytest" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage**: Available in artifacts" >> $GITHUB_STEP_SUMMARY

  frontend-test:
    name: Frontend Tests (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test
        continue-on-error: true

      - name: Test demo mode
        run: |
          cd frontend
          npm run build
          # Demo mode test would require a running server, skip in CI
        continue-on-error: true

      - name: Test summary
        if: always()
        run: |
          echo "## 🧪 Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Node.js Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Framework**: Jest" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: Completed" >> $GITHUB_STEP_SUMMARY

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update frontend submodule
        run: |
          chmod +x ./scripts/update-frontend-submodule.sh
          ./scripts/update-frontend-submodule.sh

      - name: Build frontend locally
        run: |
          chmod +x ./build.sh
          SKIP_DOCKER=1 ./build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
          tags: argusmind:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test summary
        if: always()
        run: |
          echo "## 🐳 Docker Build Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: argusmind:test" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - backend-test
      - frontend-test

    steps:
      - name: Check all tests
        run: |-
          for status in ${{ join(needs.*.result, ' ') }}
          do
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]
            then
              echo "Some tests failed"
              exit 1
            fi
          done
          echo "All tests passed"

      - name: Final summary
        run: |
          echo "## 📊 Overall Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests have been completed successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend Tests (Python)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend Tests (Node.js)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "- ✅ Docker Build Test" >> $GITHUB_STEP_SUMMARY
          fi